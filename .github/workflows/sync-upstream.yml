name: Sync upstream

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync main with upstream
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/openai/codex-plugin-cc.git
          git fetch upstream --tags
          BEFORE=$(git rev-parse HEAD)
          if git merge --ff-only upstream/main; then
            AFTER=$(git rev-parse HEAD)
            if [ "$BEFORE" = "$AFTER" ]; then
              echo "status=already-up-to-date" >> "$GITHUB_OUTPUT"
            else
              echo "status=updated" >> "$GITHUB_OUTPUT"
              echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
              echo "after=$AFTER" >> "$GITHUB_OUTPUT"
              git push origin main
              git push origin --tags
            fi
          else
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Open issue on conflict
        if: failure() && steps.sync.outputs.status == 'conflict'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[sync] Upstream merge conflict ${new Date().toISOString().slice(0,10)}`,
              body: `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nThe nightly upstream sync could not fast-forward. Resolve manually with:\n\`\`\`\ngit fetch upstream\ngit checkout main\ngit rebase upstream/main\ngit push --force-with-lease\n\`\`\``
            });
