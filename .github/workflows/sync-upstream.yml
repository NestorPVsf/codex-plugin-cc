name: Sync upstream

on:
  schedule:
    - cron: '17 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync main with upstream
        id: sync
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/openai/codex-plugin-cc.git
          git fetch upstream --tags
          BEFORE=$(git rev-parse HEAD)
          if git merge --ff-only upstream/main; then
            AFTER=$(git rev-parse HEAD)
            if [ "$BEFORE" = "$AFTER" ]; then
              echo "status=already-up-to-date" >> "$GITHUB_OUTPUT"
            else
              echo "status=updated" >> "$GITHUB_OUTPUT"
              echo "before=$BEFORE" >> "$GITHUB_OUTPUT"
              echo "after=$AFTER" >> "$GITHUB_OUTPUT"
              git push origin main
              git push origin --tags
            fi
          else
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            exit 1
          fi

      - name: Report conflict in job summary
        if: failure() && steps.sync.outputs.status == 'conflict'
        run: |
          echo "## ⚠️ Upstream sync conflict" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Workflow run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The nightly sync could not fast-forward. Resolve manually:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "git fetch upstream" >> "$GITHUB_STEP_SUMMARY"
          echo "git checkout main" >> "$GITHUB_STEP_SUMMARY"
          echo "git rebase upstream/main" >> "$GITHUB_STEP_SUMMARY"
          echo "git push --force-with-lease" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
